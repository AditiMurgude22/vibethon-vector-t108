<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile - AIML Mission Lab</title>
  <link rel="stylesheet" href="../styles.css">
</head>
<body>
  <div class="page-shell">
    <header class="top-bar">
      <h2>Profile & Progress</h2>
      <nav>
        <a class="primary-btn ghost" href="./dashboard.html">Dashboard</a>
        <button id="logout-btn" class="primary-btn ghost" type="button">Logout</button>
      </nav>
    </header>

    <main class="content-grid">
      <section class="panel">
        <h3 id="profile-name">Loading...</h3>
        <p class="subtitle">Your personal progress snapshot.</p>
        <p>Email: <span id="profile-email">...</span></p>
        <p>Score: <span id="profile-score">0</span></p>
        <p>Progress: <span id="profile-progress">0%</span></p>
        <p>Streak: <span id="profile-streak">0</span></p>
        <div id="profile-badges" class="badge-row"></div>
      </section>

      <section class="panel">
        <h3>Quiz History</h3>
        <ul id="quiz-score-list"></ul>
      </section>
      <p id="profile-error" class="error-text"></p>
    </main>
  </div>

  <script type="module" src="./profile.js"></script>
</body>
</html>
