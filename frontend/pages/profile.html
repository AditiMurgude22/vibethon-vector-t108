<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Profile - AIML Mission Lab</title>
  <link rel="stylesheet" href="../styles.css">
</head>
<body>
  <div class="dashboard-container">
    <nav class="nav-bar">
      <div class="logo">
        <h2>🚀 AIML Mission Lab</h2>
      </div>
      <div class="nav-links">
        <button class="nav-btn" onclick="goToDashboard()">Dashboard</button>
        <button class="nav-btn" onclick="loadLeaderboard()">Leaderboard</button>
        <button class="nav-btn" onclick="logout()">Logout</button>
      </div>
    </nav>

    <main class="main-content">
      <h1>Your Profile</h1>
      
      <div class="profile-card">
        <h3 id="profile-name">Loading...</h3>
        <p>Total Points: <span id="profile-points">0</span></p>
        <p>Completed Modules: <span id="completed-modules">0</span></p>
      </div>

      <div class="quiz-scores">
        <h3>Quiz Scores</h3>
        <ul id="scores-list"></ul>
      </div>
    </main>
  </div>

  <script src="../app.js"></script>
</body>
</html>
