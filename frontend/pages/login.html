<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - AIML Mission Lab</title>
  <link rel="stylesheet" href="../styles.css">
</head>
<body>
  <div class="page-shell center">
    <div class="panel auth-panel">
      <h2 id="auth-title">Login</h2>
      <p class="subtitle">Access your mission dashboard and continue your AI progress.</p>
      <form id="auth-form">
        <div id="name-field">
          <input id="name" type="text" placeholder="Your name">
        </div>
        <input id="email" type="email" placeholder="Email" required>
        <input id="password" type="password" placeholder="Password" required>
        <button id="submit-auth" class="primary-btn" type="submit">Login</button>
      </form>
      <button id="toggle-auth" class="link-btn" type="button">Need an account? Sign up</button>
      <p id="auth-error" class="error-text"></p>
    </div>
  </div>
  <script type="module" src="./login.js"></script>
</body>
</html>
