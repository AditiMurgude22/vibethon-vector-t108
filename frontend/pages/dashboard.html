<!DOCTYPE html>
<html lang="en">
<head>

  <title>Dashboard - AIML Mission Lab</title>
  <link rel="stylesheet" href="../styles.css">
</head>
<body>
  <div class="dashboard-container">
    <nav class="nav-bar">
      <div class="logo">
        <h2>🚀 AIML Mission Lab</h2>
      </div>

        <button class="nav-btn" onclick="loadProfile()">Profile</button>

      <div id="modules-container" class="modules-grid">

  </div>

  <script src="../app.js"></script>

</html>
