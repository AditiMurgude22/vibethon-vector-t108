<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - AIML Mission Lab</title>
  <link rel="stylesheet" href="../styles.css">
</head>
<body>
  <div class="page-shell">
    <header class="top-bar">
      <h2>AIML Mission Lab Dashboard</h2>
      <nav>
        <button id="logout-btn" class="primary-btn ghost" type="button">Logout</button>
      </nav>
    </header>

    <main class="content-grid dashboard-layout">
      <section class="panel full-width">
        <h3 id="welcome">👋 Welcome</h3>
        <p class="subtitle">Continue your learning journey with smart topic-based lessons.</p>
        <div class="progress-summary">
          <p id="summary-streak">🔥 Streak: 0 days</p>
          <p id="summary-progress">📊 Progress: 0%</p>
          <p id="summary-score">🏆 Score: 0 pts</p>
        </div>
        <div class="stats-grid">
          <div class="stat-card"><span>Score</span><strong id="score">0</strong></div>
          <div class="stat-card"><span>Streak</span><strong id="streak">0</strong></div>
          <div class="stat-card"><span>Progress</span><strong id="progress">0%</strong></div>
        </div>
        <div class="progress-track"><div id="progress-fill" class="progress-fill"></div></div>
        <div id="badges" class="badge-row"></div>
      </section>

      <section class="panel learn-card-wrap">
        <div class="learn-card">
          <h3>Learn Any Topic</h3>
          <p>Enter any topic and start learning instantly</p>
          <button id="start-learning-btn" class="primary-btn" type="button">Start Learning</button>
        </div>
      </section>
      <p id="dashboard-error" class="error-text"></p>
    </main>
  </div>

  <script type="module" src="./dashboard.js"></script>
</body>
</html>
