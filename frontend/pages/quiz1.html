<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz 1 - AIML Mission Lab</title>
  <link rel="stylesheet" href="../styles.css">
</head>
<body>
  <div class="page-shell">
    <header class="top-bar">
      <h2 id="quiz-title">Quiz</h2>
      <nav>
        <a class="primary-btn ghost" href="./module1.html">Back to Module</a>
        <button id="logout-btn" class="primary-btn ghost" type="button">Logout</button>
      </nav>
    </header>

    <main class="content-grid">
      <section class="panel full-width">
        <p class="subtitle">Answer each question and submit to earn points.</p>
        <p id="quiz-progress">Q1/5</p>
        <h3 id="quiz-prompt">Loading...</h3>
        <div id="quiz-options"></div>
        <div class="row">
          <button id="next-btn" class="primary-btn" type="button">Next</button>
          <button id="submit-btn" class="primary-btn" type="button" style="display:none;">Submit</button>
        </div>
        <div id="quiz-feedback" class="panel feedback" style="display:none;"></div>
      </section>
    </main>
  </div>

  <script type="module" src="./quiz.js"></script>
</body>
</html>
